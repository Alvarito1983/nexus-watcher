name: nexus-watcher

services:
  nexus-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: nexus-watcher-proxy
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      CONTAINERS: 1
      IMAGES: 1
      NETWORKS: 1
      VOLUMES: 1
      INFO: 1
      POST: 1
      DELETE: 1
      ALLOW_START: 1
      ALLOW_STOP: 1
      ALLOW_RESTARTS: 1

  nexus-watcher:
    image: afraguas1983/nexus-watcher:latest
    container_name: nexus-watcher
    restart: unless-stopped
    depends_on:
      - nexus-proxy
    volumes:
      - watcher-data:/app/data
    environment:
      DOCKER_HOST: tcp://nexus-proxy:2375
      PORT: 3002
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      SCAN_INTERVAL: ${SCAN_INTERVAL:-3600}
    ports:
      - "9091:3002"

volumes:
  watcher-data:
